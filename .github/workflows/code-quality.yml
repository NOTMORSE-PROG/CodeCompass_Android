# .github/workflows/code-quality.yml
#
# Runs Android Lint on the :app module.
# No secrets are required — build.gradle.kts falls back to default values
# when local.properties is absent.
#
# Lint reports (HTML + XML) are uploaded as artifacts even on failure
# so developers can inspect what went wrong.

name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Android Lint ───────────────────────────────────────────────────────────
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # setup-gradle handles Gradle wrapper validation and dependency caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Linux runners do not preserve the executable bit from git.
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Run lint on the debug variant. No local.properties needed because
      # build.gradle.kts uses getProperty(..., "default") fallbacks.
      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      # Upload lint reports so developers can inspect them even on failure.
      # Both HTML (human-readable) and XML (tooling-friendly) are uploaded.
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 14

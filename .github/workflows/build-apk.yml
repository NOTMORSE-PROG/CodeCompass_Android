# .github/workflows/build-apk.yml
#
# Builds the CodeCompass Android debug APK.
# Triggered on pushes/PRs to main or develop, and on manual dispatch.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   BASE_URL             - REST API base URL
#   WS_BASE_URL          - WebSocket base URL
#   GOOGLE_WEB_CLIENT_ID - Google OAuth web client ID
#
#   Each secret is written to local.properties only when non-empty.
#   If a secret is absent, build.gradle.kts getProperty() defaults apply automatically.
#   Note: sdk.dir is not needed in CI — ANDROID_HOME is pre-set on GitHub runners.

name: Build APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Build debug APK ────────────────────────────────────────────────────────
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # AGP 9.x requires JDK 17+. Temurin is the recommended distribution.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # setup-gradle handles Gradle wrapper validation and dependency caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Write each secret to local.properties only when non-empty.
      # If a secret is absent the key is omitted entirely, so build.gradle.kts
      # getProperty("KEY", "default") falls back to its hardcoded default.
      # (Writing an empty value would override the default with "".)
      - name: Inject secrets into local.properties
        run: |
          [ -n "${{ secrets.BASE_URL }}" ]             && echo "BASE_URL=${{ secrets.BASE_URL }}"                         >> local.properties || true
          [ -n "${{ secrets.WS_BASE_URL }}" ]          && echo "WS_BASE_URL=${{ secrets.WS_BASE_URL }}"                   >> local.properties || true
          [ -n "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ] && echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> local.properties || true

      # Linux runners do not preserve the executable bit from git.
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      # Upload the APK so it is available as a workflow artifact for 7 days.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codecompass-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

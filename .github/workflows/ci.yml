name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── 1. Android Lint ────────────────────────────────────────────────────────
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to commit the generated lint baseline

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate lint baseline if absent
        run: |
          if [ ! -f app/lint-baseline.xml ]; then
            echo "No lint baseline found — generating one now."
            ./gradlew :app:updateLintBaseline --stacktrace
            echo "BASELINE_GENERATED=true" >> "$GITHUB_ENV"
          else
            echo "Existing baseline found — skipping generation."
          fi

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Commit generated baseline
        if: env.BASELINE_GENERATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/lint-baseline.xml
          git commit -m "Generate lint baseline for pre-existing issues"
          git push

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 14

  # ── 2. Gitleaks — full git history secret scan ────────────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify local.properties is not committed
        run: |
          if git ls-files | grep -q "local.properties"; then
            echo "ERROR: local.properties is tracked by git!"
            echo "Fix: git rm --cached local.properties"
            exit 1
          fi
          echo "OK: local.properties is not tracked by git."

      - name: Scan for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Android-specific pattern scan (config-driven) ─────────────────────
  android-secret-grep:
    name: Android Hardcoded Value Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check resource files for suspicious API key patterns
        run: |
          CONFIG=".github/security-scan-config.yml"
          LEN=$(yq '.suspicious_key_min_length' "$CONFIG")
          RES_INCLUDES=$(yq '.resource_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')
          EXCLUDES=$(yq '.exclude_dirs[]' "$CONFIG" | sed 's/^/--exclude-dir=/' | tr '\n' ' ')
          SCAN_DIRS=$(yq '.scan_dirs[]' "$CONFIG" | tr '\n' ' ')

          echo "--- Scanning resource files for strings >= ${LEN} chars ---"
          if grep -rn $RES_INCLUDES $EXCLUDES -E "[A-Za-z0-9_-]{${LEN},}" $SCAN_DIRS; then
            echo "WARNING: Found long strings in resource files — review for API keys or tokens."
          else
            echo "OK: No suspicious values in resource files."
          fi

      - name: Check source files for hardcoded sensitive identifiers
        run: |
          CONFIG=".github/security-scan-config.yml"
          KEYWORDS=$(yq '.sensitive_keywords[]' "$CONFIG" | paste -sd'|')
          SRC_INCLUDES=$(yq '.source_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')
          EXCLUDES=$(yq '.exclude_dirs[]' "$CONFIG" | sed 's/^/--exclude-dir=/' | tr '\n' ' ')
          SCAN_DIRS=$(yq '.scan_dirs[]' "$CONFIG" | tr '\n' ' ')

          # Build a single alternation pattern of lines to exclude (false positives).
          FP_PATTERN=$(yq '.exclude_line_patterns[]' "$CONFIG" | paste -sd'|')

          # Pattern matches: keyword = "value" or keyword = 'value'
          PATTERN="(${KEYWORDS})[[:space:]]*[=:][[:space:]]*['\"][^'\"]*['\"]"

          echo "--- Scanning source files for sensitive identifiers ---"
          FAILED=0
          MATCHES=$(grep -rn $SRC_INCLUDES $EXCLUDES -iE "$PATTERN" $SCAN_DIRS \
                    | grep -vE "$FP_PATTERN" || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "FAIL: Potential hardcoded sensitive value found in source."
            FAILED=1
          fi
          [ $FAILED -eq 0 ] && echo "OK: No hardcoded sensitive identifiers found."
          exit $FAILED

      - name: Check source files for base64-encoded secrets
        run: |
          CONFIG=".github/security-scan-config.yml"
          LEN=$(yq '.suspicious_base64_min_length' "$CONFIG")
          SRC_INCLUDES=$(yq '.source_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')
          RES_INCLUDES=$(yq '.resource_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')
          EXCLUDES=$(yq '.exclude_dirs[]' "$CONFIG" | sed 's/^/--exclude-dir=/' | tr '\n' ' ')
          SCAN_DIRS=$(yq '.scan_dirs[]' "$CONFIG" | tr '\n' ' ')

          echo "--- Scanning for base64-like strings >= ${LEN} chars ---"
          if grep -rn $SRC_INCLUDES $RES_INCLUDES $EXCLUDES \
               -E "['\"][A-Za-z0-9+/]{${LEN},}={0,2}['\"]" $SCAN_DIRS; then
            echo "WARNING: Found long base64-like strings — review for encoded credentials."
          else
            echo "OK: No suspicious base64 blobs found."
          fi

      - name: Warn about hardcoded URL defaults in build.gradle.kts
        run: |
          CONFIG=".github/security-scan-config.yml"
          URL_PATTERNS=$(yq '.hardcoded_url_patterns[]' "$CONFIG" | paste -sd'|')

          echo "--- Checking build.gradle.kts for hardcoded URL defaults ---"
          if grep -nE "$URL_PATTERNS" app/build.gradle.kts; then
            echo "WARNING: Hardcoded production URL defaults found in build.gradle.kts."
            echo "Consider moving URLs to build variants instead of getProperty() defaults."
          else
            echo "OK: No hardcoded URL defaults detected."
          fi

  # ── 4. Build APK — runs only after lint and both security jobs pass ────────
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest
    needs: [lint, gitleaks, android-secret-grep]
    permissions:
      contents: write  # required to create/update GitHub releases

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject secrets into local.properties
        run: |
          [ -n "${{ secrets.BASE_URL }}" ]             && echo "BASE_URL=${{ secrets.BASE_URL }}"                         >> local.properties || true
          [ -n "${{ secrets.WS_BASE_URL }}" ]          && echo "WS_BASE_URL=${{ secrets.WS_BASE_URL }}"                   >> local.properties || true
          [ -n "${{ secrets.GOOGLE_WEB_CLIENT_ID }}" ] && echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> local.properties || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Rename APK with short SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/codecompass-debug-${SHORT_SHA}.apk
          echo "APK_NAME=codecompass-debug-${SHORT_SHA}.apk" >> "$GITHUB_ENV"
          echo "APK_PATH=app/build/outputs/apk/debug/codecompass-debug-${SHORT_SHA}.apk" >> "$GITHUB_ENV"

      # Keep an artifact copy in the Actions run for easy download
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # On pushes to main: update the rolling "latest" pre-release so the APK
      # is always visible in the Releases section of the repository.
      - name: Publish to GitHub Releases (latest)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Delete the old "latest" release + tag so we can recreate it fresh
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          # Create a new "latest" pre-release and attach the APK
          gh release create latest "${{ env.APK_PATH }}" \
            --title "Latest Debug Build (${SHORT_SHA})" \
            --notes "$(cat <<'EOF'
          Automated debug build from the latest commit on **main**.

          > This is a pre-release. For stable builds, use a versioned release tag (e.g. `v1.0.0`).

          **Commit:** ${{ github.sha }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )" \
            --prerelease \
            --target main

      # On version tags (v*): publish a proper versioned release
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ env.APK_PATH }}" \
            --title "CodeCompass ${{ github.ref_name }}" \
            --generate-notes

# .github/workflows/security-scan.yml
#
# Two-layer security scan:
#   1. Gitleaks  — scans full git history for committed secrets
#   2. Android-specific grep — config-driven hardcoded value detection
#
# Scan patterns are defined in .github/security-scan-config.yml.
# To add/change patterns: edit that config file — no workflow changes needed.
#
# NOTE on BASE_URL default: build.gradle.kts embeds production URLs as
# getProperty() defaults. This is flagged as a warning (not a hard failure)
# because the pattern is intentional for local dev fallback, but should
# eventually be replaced with a build-variant-specific approach.

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Gitleaks — full git history secret scan ────────────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for gitleaks commit-range scanning

      # Check that local.properties (which may contain real secrets) is not
      # tracked by git. It is listed in .gitignore but an accidental
      # `git add -f` could bypass that.
      - name: Verify local.properties is not committed
        run: |
          if git ls-files | grep -q "local.properties"; then
            echo "ERROR: local.properties is tracked by git!"
            echo "It contains secrets and must never be committed."
            echo "Fix: git rm --cached local.properties"
            exit 1
          fi
          echo "OK: local.properties is not tracked by git."

      # Gitleaks scans every commit reachable from the current HEAD.
      # GITHUB_TOKEN is auto-provided — no manual secret needed.
      - name: Scan for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Android-specific pattern scan (config-driven) ─────────────────────
  android-secret-grep:
    name: Android Hardcoded Value Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Install yq to parse .github/security-scan-config.yml at runtime.
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # Read all scan parameters from the config file and expose them as
      # step outputs so subsequent steps can use them without re-parsing.
      - name: Load scan config
        id: config
        run: |
          CONFIG=".github/security-scan-config.yml"

          KEY_LEN=$(yq '.suspicious_key_min_length' "$CONFIG")
          B64_LEN=$(yq '.suspicious_base64_min_length' "$CONFIG")

          # Build grep --include flags for source and resource extensions
          SRC_INCLUDES=$(yq '.source_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')
          RES_INCLUDES=$(yq '.resource_extensions[]' "$CONFIG" | sed 's/^/--include=/' | tr '\n' ' ')

          # Build grep --exclude-dir flags
          EXCLUDES=$(yq '.exclude_dirs[]' "$CONFIG" | sed 's/^/--exclude-dir=/' | tr '\n' ' ')

          # Build keyword alternation pattern: (keyword1|keyword2|...)
          KEYWORDS=$(yq '.sensitive_keywords[]' "$CONFIG" | paste -sd'|')
          KEYWORD_PATTERN="(${KEYWORDS})\s*[=:]\s*\"[^\"]+\""

          # Build URL warning pattern (pipe-delimited alternation)
          URL_PATTERNS=$(yq '.hardcoded_url_patterns[]' "$CONFIG" | paste -sd'|')

          # Scan target directories (space-separated)
          SCAN_DIRS=$(yq '.scan_dirs[]' "$CONFIG" | tr '\n' ' ')

          echo "key_len=$KEY_LEN"                     >> "$GITHUB_OUTPUT"
          echo "b64_len=$B64_LEN"                     >> "$GITHUB_OUTPUT"
          echo "src_includes=$SRC_INCLUDES"           >> "$GITHUB_OUTPUT"
          echo "res_includes=$RES_INCLUDES"           >> "$GITHUB_OUTPUT"
          echo "excludes=$EXCLUDES"                   >> "$GITHUB_OUTPUT"
          echo "keyword_pattern=$KEYWORD_PATTERN"     >> "$GITHUB_OUTPUT"
          echo "url_patterns=$URL_PATTERNS"           >> "$GITHUB_OUTPUT"
          echo "scan_dirs=$SCAN_DIRS"                 >> "$GITHUB_OUTPUT"

      # Scan XML resource files for suspiciously long alphanumeric strings
      # that could be API keys or tokens. Threshold read from config.
      - name: Check resource files for suspicious API key patterns
        run: |
          LEN="${{ steps.config.outputs.key_len }}"
          echo "--- Scanning resource files for strings >= ${LEN} chars ---"
          if grep -rn ${{ steps.config.outputs.res_includes }} \
               ${{ steps.config.outputs.excludes }} \
               -E "[A-Za-z0-9_\-]{${LEN},}" \
               ${{ steps.config.outputs.scan_dirs }}; then
            echo "WARNING: Found long strings in resource files — review for API keys or tokens."
          else
            echo "OK: No suspicious values in resource files."
          fi

      # Scan Kotlin/Java source for assignment-style hardcoded sensitive values.
      # Pattern and keywords are driven by config. Hard failure on match.
      - name: Check source files for hardcoded sensitive identifiers
        run: |
          PATTERN="${{ steps.config.outputs.keyword_pattern }}"
          echo "--- Scanning source files for sensitive identifiers ---"
          echo "Pattern: $PATTERN"
          FAILED=0
          if grep -rn ${{ steps.config.outputs.src_includes }} \
               ${{ steps.config.outputs.excludes }} \
               -iE "$PATTERN" \
               ${{ steps.config.outputs.scan_dirs }}; then
            echo "FAIL: Potential hardcoded sensitive value found in source."
            FAILED=1
          fi
          if [ $FAILED -eq 0 ]; then
            echo "OK: No hardcoded sensitive identifiers found."
          fi
          exit $FAILED

      # Scan for base64-encoded blobs in source/resource files — a common
      # technique for obfuscating embedded secrets. Threshold from config.
      - name: Check source files for base64-encoded secrets
        run: |
          LEN="${{ steps.config.outputs.b64_len }}"
          ALL_INCLUDES="${{ steps.config.outputs.src_includes }} ${{ steps.config.outputs.res_includes }}"
          echo "--- Scanning for base64-like strings >= ${LEN} chars ---"
          if grep -rn $ALL_INCLUDES \
               ${{ steps.config.outputs.excludes }} \
               -E "\"[A-Za-z0-9+/]{${LEN},}={0,2}\"" \
               ${{ steps.config.outputs.scan_dirs }}; then
            echo "WARNING: Found long base64-like strings — review for encoded credentials."
          else
            echo "OK: No suspicious base64 blobs found."
          fi

      # Warn (no hard failure) about production URL defaults in build.gradle.kts.
      # These are intentional local-dev fallbacks but should eventually move
      # to build variants. Patterns are read from config.
      - name: Warn about hardcoded URL defaults in build.gradle.kts
        run: |
          URL_PATTERNS="${{ steps.config.outputs.url_patterns }}"
          echo "--- Checking build.gradle.kts for hardcoded URL defaults ---"
          if grep -nE "$URL_PATTERNS" app/build.gradle.kts; then
            echo ""
            echo "WARNING: Hardcoded production URL defaults found in build.gradle.kts."
            echo "Consider moving URLs to build variants instead of getProperty() defaults."
            echo "This is a WARNING only — the build is not failed for this pattern."
          else
            echo "OK: No hardcoded URL defaults detected."
          fi
